name = "icca-portal-worker"
main = "src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "ICCA_KV"
id = "REPLACE_WITH_YOUR_KV_ID"
preview_id = "REPLACE_WITH_PREVIEW_ID"

[triggers]
crons = ["0 * * * *"]

[vars]
ALLOWED_ORIGIN = "https://surveyresults.pages.dev"

[env.dev]
name = "icca-portal-worker-dev"
vars = { ALLOWED_ORIGIN = "http://localhost:5173" }
[[env.dev.kv_namespaces]]
binding = "ICCA_KV"
id = "REPLACE_WITH_YOUR_KV_ID"
preview_id = "REPLACE_WITH_PREVIEW_ID"
